services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: rustdesk-tailscale
    hostname: rustdesk
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  hbbs:
    container_name: hbbs
    image: rustdesk/rustdesk-server:latest
    command: hbbs -r rustdesk:21117
    network_mode: service:tailscale
    volumes:
      - ./data:/root
    depends_on:
      - tailscale
    restart: unless-stopped

  hbbr:
    container_name: hbbr
    image: rustdesk/rustdesk-server:latest
    command: hbbr
    network_mode: service:tailscale
    volumes:
      - ./data:/root
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  tailscale-state:
